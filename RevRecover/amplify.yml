version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --prefix app
        - npm ci --prefix enterprise-portal
    build:
      commands:
        - npm run build --prefix enterprise-portal
        - npm run build --prefix app
        # Merge the portal into the app's distribution folder
        - mkdir -p app/dist/portal
        - cp -r enterprise-portal/dist/* app/dist/portal/
  artifacts:
    baseDirectory: app/dist
    files:
      - '**/*'
  cache:
    paths:
      - app/node_modules/**/*
      - enterprise-portal/node_modules/**/*
